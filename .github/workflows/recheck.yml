name: recheck

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

# Same group as scan.yml: recheck never overlaps a pipeline run (they share
# the verification provider and its paid-call budget).
concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  recheck:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # No-op while SILENT_MODE=true; the rest of the env is only validated
      # once the operator flips it to false.
      - run: npm run recheck
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VERIFIER_PROVIDER: ${{ secrets.VERIFIER_PROVIDER || 'fli' }}
          SEARCHAPI_KEY: ${{ secrets.SEARCHAPI_KEY }}
          FLIGHTAPI_KEY: ${{ secrets.FLIGHTAPI_KEY }}
          MAX_VERIFICATIONS_PER_RUN: ${{ secrets.MAX_VERIFICATIONS_PER_RUN || '2' }}
          FLI_PAUSE_MS: ${{ secrets.FLI_PAUSE_MS || '1500' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          CURATOR_CHAT_ID: ${{ secrets.CURATOR_CHAT_ID }}
          REDIRECT_BASE_URL: ${{ secrets.REDIRECT_BASE_URL }}
          SILENT_MODE: ${{ secrets.SILENT_MODE || 'true' }}
