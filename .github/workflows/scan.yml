name: scan

# Minimal early version: only the layer-1 sweep, so the price baseline
# accumulates while later phases are built. Phase 7 extends this job to
# the full pipeline (scan -> detect -> verify).

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run scan
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
