name: pipeline

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

# Single group shared with recheck.yml: never two paid-capable runs at once.
concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Unset secrets arrive as "" (not undefined), which would fail zod
      # validation — hence the inline defaults on the non-secret knobs.
      # Verify/telegram secrets are only validated when SILENT_MODE=false.
      - run: npm run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          VERIFIER_PROVIDER: ${{ secrets.VERIFIER_PROVIDER || 'fli' }}
          SEARCHAPI_KEY: ${{ secrets.SEARCHAPI_KEY }}
          FLIGHTAPI_KEY: ${{ secrets.FLIGHTAPI_KEY }}
          MAX_VERIFICATIONS_PER_RUN: ${{ secrets.MAX_VERIFICATIONS_PER_RUN || '2' }}
          FLI_MAX_VERIFICATIONS_PER_RUN: ${{ secrets.FLI_MAX_VERIFICATIONS_PER_RUN || '80' }}
          FLI_PAUSE_MS: ${{ secrets.FLI_PAUSE_MS || '1500' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CURATOR_CHAT_ID: ${{ secrets.CURATOR_CHAT_ID }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          REDIRECT_BASE_URL: ${{ secrets.REDIRECT_BASE_URL }}
          SILENT_MODE: ${{ secrets.SILENT_MODE || 'true' }}
          AUTO_PUBLISH: ${{ secrets.AUTO_PUBLISH || 'false' }}
